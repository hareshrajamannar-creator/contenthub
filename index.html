
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Material Symbols — required by agent-builder components -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Icomoon phoenix icon font — required by @birdeye/elemental components (icon_phoenix-* classes) -->
    <link rel="stylesheet" href="https://cdn.icomoon.io/101518/phoenix/style.css?qskdks" />
      <title>Welcome – Birdeye</title>
      <!-- Sync theme on <html> before paint / before the app bundle runs (must match useTheme.v1 STORAGE_KEY + resolve rules). -->
      <script>
        (function () {
          try {
            var KEY = "app_theme";
            var v = localStorage.getItem(KEY);
            if (v !== "light" && v !== "dark" && v !== "auto") {
              v = "light";
              localStorage.setItem(KEY, v);
            }
            var prefersDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
            var dark = v === "dark" || (v === "auto" && prefersDark);
            document.documentElement.classList.toggle("dark", dark);
          } catch (e) {
            document.documentElement.classList.remove("dark");
          }
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
